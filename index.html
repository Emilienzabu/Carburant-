<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarburantRadar</title>
<meta name="theme-color" content="#f5a623">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:sans-serif;padding:20px}
header{background:#16161f;border-bottom:1px solid #252535;padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;margin:-20px -20px 20px}
.ico{width:36px;height:36px;background:#f5a623;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.h1{font-size:17px;font-weight:800}.h1 span{color:#f5a623}
.sub{font-size:10px;color:#6b6b8a}
button{width:100%;padding:15px;background:#f5a623;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
#log{background:#111;border:1px solid #333;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:#0f0;margin-bottom:12px;min-height:80px;white-space:pre-wrap;display:none}
#log.on{display:block}
</style>
</head>
<body>
<header>
<div class="ico">⛽</div>
<div><div class="h1">Carburant<span>Radar</span></div><div class="sub">DIAGNOSTIC</div></div>
</header>

<button onclick="test()">🔍 Tester la connexion</button>
<div id="log"></div>

<script>
const PROXY='https://carburant-proxy.emilienzabukovec09.workers.dev';

function log(msg){
  const el=document.getElementById('log');
  el.className='on';
  el.textContent+=msg+'\n';
}

async function test(){
  document.getElementById('log').textContent='';
  log('1. Test géolocalisation...');
  
  if(!navigator.geolocation){log('❌ Géolocalisation non supportée');return}
  
  navigator.geolocation.getCurrentPosition(async pos=>{
    const la=pos.coords.latitude, lo=pos.coords.longitude;
    log(`✅ Position: ${la.toFixed(4)}, ${lo.toFixed(4)}`);
    log('2. Test Worker Cloudflare...');
    
    try{
      const url=`${PROXY}?limit=1`;
      log(`URL: ${url}`);
      const r=await fetch(url);
      log(`Status: ${r.status}`);
      if(r.ok){
        const d=await r.json();
        log(`✅ Worker OK - ${d.total_count} stations au total`);
        log('3. Test avec coordonnées...');
        const url2=`${PROXY}?limit=3&where=dist(geo_point_borne%2C+geom'POINT(${lo}+${la})'%2C+10000m)`;
        log(`URL2: ${url2}`);
        const r2=await fetch(url2);
        log(`Status2: ${r2.status}`);
        const d2=await r2.json();
        log(`✅ Résultats: ${JSON.stringify(d2).substring(0,200)}`);
      } else {
        const txt=await r.text();
        log(`❌ Erreur: ${txt}`);
      }
    }catch(e){
      log(`❌ Exception: ${e.message}`);
    }
  }, err=>{
    log(`❌ Erreur GPS: ${err.message} (code ${err.code})`);
  },{enableHighAccuracy:true,timeout:12000});
}
</script>
</body>
</html>
